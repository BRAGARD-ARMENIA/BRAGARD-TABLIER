<script>
(function() {
const gallery = document.getElementById('galleryScroll');
const dotsContainer = document.getElementById('dotIndicators');
const colorContainer = document.getElementById('colorContainer');

const colorItems = [
{ code: 'CW188-WHT-000', class: 'circle-1', index: 0 },
{ code: 'CW188-BLK-000', class: 'circle-2', index: 6 },
{ code: 'CW188-GRY-000', class: 'circle-3', index: 10 },
{ code: 'CW188-KHA-000', class: 'circle-4', index: 14 },
{ code: 'CW188-KEL-000', class: 'circle-5', index: 18 },
{ code: 'CW188-RED-000', class: 'circle-6', index: 23 },
{ code: 'CW188-PUR-000', class: 'circle-7', index: 27 },
{ code: 'CW188-HOT-000', class: 'circle-8', index: 32 },
{ code: 'CW188-LEM-000', class: 'circle-9', index: 34 },
{ code: 'CW188-NAV-000', class: 'circle-10', index: 39 },
{ code: 'CW188-TUR-000', class: 'circle-11', index: 43 },
{ code: 'CW188-ROY-000', class: 'circle-12', index: 47 },
{ code: 'CW188-TAG-000', class: 'circle-13', index: 51 },
{ code: 'CW188-HUN-000', class: 'circle-14', index: 56 },
{ code: 'CW188-LIM-000', class: 'circle-15', index: 59 }
];

const totalGalleryImages = document.querySelectorAll('.gallery-item').length; // 63

const maxDots = 5;
let dotsHtml = '';
for (let i = 0; i < maxDots; i++) {
dotsHtml += `<span class="dot${i === 0 ? ' active' : ''}" data-index="${i}"></span>`;
}
dotsContainer.innerHTML = dotsHtml;

let colorsHtml = '';
colorItems.forEach((item, idx) => {
colorsHtml += `
<div class="title-color-item ${idx === 0 ? 'active' : ''}" data-gallery-index="${item.index}" data-item-index="${idx}">
<div class="title-circle ${item.class}"></div>
<span>${item.code}</span>
</div>
`;
});
colorContainer.innerHTML = colorsHtml;

const dots = document.querySelectorAll('.dot');
const titleColors = document.querySelectorAll('.title-color-item');

function scrollToImage(index) {
if (gallery && index >= 0 && index < totalGalleryImages) {
gallery.scrollTo({
left: index * gallery.clientWidth,
behavior: 'smooth'
});
}
}

function getCurrentGalleryIndex() {
if (!gallery) return 0;
return Math.round(gallery.scrollLeft / gallery.clientWidth);
}

function updateActiveStates() {
if (!gallery) return;

const currentIndex = getCurrentGalleryIndex();

// dots-երի թարմացում - 5 հատի համար
// currentIndex-ը 0-62 է, բաժանում ենք 5 հավասար հատվածների
const segmentSize = totalGalleryImages / maxDots; // 63/5 = 12.6
let activeDotIndex = Math.floor(currentIndex / segmentSize);
if (activeDotIndex >= maxDots) activeDotIndex = maxDots - 1;

dots.forEach((dot, i) => {
dot.classList.toggle('active', i === activeDotIndex);
});

// գույների ակտիվ վիճակի թարմացում
titleColors.forEach(item => {
const galleryIndex = parseInt(item.dataset.galleryIndex);
if (galleryIndex === currentIndex) {
item.classList.add('active');
} else {
item.classList.remove('active');
}
});
}

let scrollTimeout;
gallery.addEventListener('scroll', () => {
if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
scrollTimeout = requestAnimationFrame(updateActiveStates);
}, { passive: true });

dotsContainer.addEventListener('click', (e) => {
const dot = e.target.closest('.dot');
if (dot && dot.dataset.index) {
const dotIndex = parseInt(dot.dataset.index);
const segmentSize = totalGalleryImages / maxDots;
let targetIndex = Math.floor(dotIndex * segmentSize + segmentSize / 2);
if (targetIndex >= totalGalleryImages) targetIndex = totalGalleryImages - 1;
scrollToImage(targetIndex);
}
});

titleColors.forEach(item => {
item.addEventListener('click', () => {
const galleryIndex = parseInt(item.dataset.galleryIndex);
if (!isNaN(galleryIndex)) {
scrollToImage(galleryIndex);
}
});
});

let resizeTimeout;
window.addEventListener('resize', () => {
if (resizeTimeout) clearTimeout(resizeTimeout);
resizeTimeout = setTimeout(() => {
updateActiveStates();
}, 100);
});

updateActiveStates();
})();
</script>
